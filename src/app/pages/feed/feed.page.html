<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      <img src="assets/images/logo-icon-white.svg" alt="UsersConnect" class="toolbar-logo">
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  @if (loading() && posts().length === 0) {
    <div class="loading-container">
      <ion-spinner color="primary"></ion-spinner>
      <p>Loading feed...</p>
    </div>
  }

  @if (error()) {
    <div class="state-container">
      <p class="state-msg">{{ error() }}</p>
      <ion-button fill="outline" color="primary" (click)="loadFeed()">Retry</ion-button>
    </div>
  }

  @if (!loading() && !error() && posts().length === 0) {
    <div class="state-container">
      <p class="state-msg">Nothing here yet. Be the first to post!</p>
    </div>
  }

  @if (authService.currentUser(); as user) {
    @for (post of posts(); track post._id) {
      <app-post-card
        [post]="post"
        [currentUser]="user"
        [showComments]="false"
        (postUpdated)="onPostUpdated($event)"
        (postDeleted)="onPostDeleted($event)">
      </app-post-card>
    }
  }

  <div class="bottom-spacer"></div>
</ion-content>
